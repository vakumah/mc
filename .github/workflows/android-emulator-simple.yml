name: Android Emulator (Simple - No Tunnel)

on:
  workflow_dispatch:

jobs:
  test-emulator:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run emulator with reactivecircus
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: arm64-v8a
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-save -no-audio -no-boot-anim
          disable-animations: true
          script: |
            echo "✅ Emulator started!"
            adb devices
            adb shell getprop ro.build.version.release
            
            # Install your APK here
            # adb install app.apk
            
            # Run tests
            # adb shell am instrument -w com.example.test/androidx.test.runner.AndroidJUnitRunner
            
            # Take screenshot
            adb exec-out screencap -p > screenshot.png
            
            echo "🎉 Done!"

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png
