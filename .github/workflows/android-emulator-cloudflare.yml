name: Android Emulator (Cloudflare Tunnel)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes (max 360 = 6 hours)'
        required: true
        default: '360'

jobs:
  stream:
    runs-on: macos-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install
          pip3 install websockify

      - name: Clone noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git
          cd noVNC && git checkout v1.4.0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install system image
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "emulator"
          sdkmanager "system-images;android-33;google_apis;arm64-v8a"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n test_avd \
            -k "system-images;android-33;google_apis;arm64-v8a" \
            -d "pixel_6" --force

      - name: Enable VNC
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all

      - name: Start services
        run: |
          # Start websockify
          websockify --web=./noVNC 6080 localhost:5900 &
          
          # Start emulator
          $ANDROID_HOME/emulator/emulator -avd test_avd \
            -no-audio -no-boot-anim -gpu swiftshader_indirect -no-window &
          
          # Wait for boot
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
          
          # Start web server
          node server.js &
          
          sleep 5

      - name: Setup Cloudflare Tunnel
        run: |
          # Install cloudflared
          brew install cloudflare/cloudflare/cloudflared
          
          # Start tunnel (no auth needed for quick tunnels)
          cloudflared tunnel --url http://localhost:3000 > tunnel.log 2>&1 &
          
          sleep 10
          
          # Extract URL
          grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' tunnel.log | head -1 > public_url.txt
          
          PUBLIC_URL=$(cat public_url.txt)
          echo "✅ Access emulator at: $PUBLIC_URL/vnc.html"

      - name: Post URL to commit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const url = fs.readFileSync('public_url.txt', 'utf8').trim();
            
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Android Emulator Live!**\n\n🌐 ${url}/vnc.html\n\n⏱️ Active for ${{ github.event.inputs.duration }} min`
            });

      - name: Keep alive
        run: |
          echo "Running for ${{ github.event.inputs.duration }} minutes..."
          cat public_url.txt
          sleep $((${{ github.event.inputs.duration }} * 60))

      - name: Cleanup
        if: always()
        run: |
          pkill -f emulator || true
          pkill -f websockify || true
          pkill -f cloudflared || true
