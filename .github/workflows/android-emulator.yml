name: Android Emulator Web Streaming

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes (max 360 = 6 hours)'
        required: true
        default: '360'

jobs:
  stream-emulator:
    runs-on: macos-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install
          pip3 install websockify
          
      - name: Clone noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git
          cd noVNC
          git checkout v1.4.0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android system image
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "emulator"
          sdkmanager "system-images;android-33;google_apis;arm64-v8a"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n test_avd \
            -k "system-images;android-33;google_apis;arm64-v8a" \
            -d "pixel_6" \
            --force

      - name: Enable VNC on macOS
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all

      - name: Start websockify
        run: |
          websockify --web=./noVNC 6080 localhost:5900 > websockify.log 2>&1 &
          echo $! > websockify.pid
          sleep 3

      - name: Start Android Emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd test_avd \
            -no-audio -no-boot-anim -gpu swiftshader_indirect \
            -no-snapshot-load -no-window > emulator.log 2>&1 &
          echo $! > emulator.pid

      - name: Wait for emulator
        run: |
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
          adb devices
          echo "✅ Emulator is ready!"

      - name: Start web server
        run: |
          node server.js > server.log 2>&1 &
          echo $! > server.pid
          sleep 2

      - name: Setup ngrok tunnel
        run: |
          brew install ngrok/ngrok/ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok http 3000 --log=stdout > ngrok.log 2>&1 &
          sleep 5

      - name: Get public URL
        run: |
          echo "🌍 Getting public URL..."
          sleep 3
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' > public_url.txt
          PUBLIC_URL=$(cat public_url.txt)
          echo "✅ Emulator available at: $PUBLIC_URL/vnc.html"
          echo "PUBLIC_URL=$PUBLIC_URL" >> $GITHUB_ENV
          
      - name: Create status comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const publicUrl = fs.readFileSync('public_url.txt', 'utf8').trim();
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Android Emulator is Live!**\n\n` +
                    `🌐 Access here: ${publicUrl}/vnc.html\n\n` +
                    `⏱️ Duration: ${{ github.event.inputs.duration }} minutes\n` +
                    `📱 Device: Pixel 6 (ARM64)\n` +
                    `🤖 Android: 13 (API 33)`
            });

      - name: Keep alive
        run: |
          echo "🎮 Emulator is running..."
          echo "⏱️  Will run for ${{ github.event.inputs.duration }} minutes"
          echo "🌐 Access at: $(cat public_url.txt)/vnc.html"
          
          # Keep running for specified duration
          sleep $((${{ github.event.inputs.duration }} * 60))

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            *.log
            *.pid

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          [ -f emulator.pid ] && kill $(cat emulator.pid) || true
          [ -f websockify.pid ] && kill $(cat websockify.pid) || true
          [ -f server.pid ] && kill $(cat server.pid) || true
          pkill ngrok || true
