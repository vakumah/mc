name: macos-vnc-bore

on: workflow_dispatch

jobs:
  run:
    runs-on: macos-latest
    steps:
      - name: Install bore
        run: |
          curl -L -o bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-apple-darwin.tar.gz
          tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/bore

      - name: Enable Screen Sharing and set VNC password
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -restart -agent -privs -all -allowAccessFor -allUsers
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -setvncpw -vncpw password123

      - name: Start bore tunnel
        run: |
          bore local 5900 --to bore.pub > bore.log 2>&1 &
          sleep 5
          cat bore.log

      - name: Keep alive for 6 hours
        run: |
          end=$((SECONDS+21600))
          while [ $SECONDS -lt $end ]; do
            echo "Time remaining: $(( (end - SECONDS) / 60 )) minutes"
            sleep 60
          done
