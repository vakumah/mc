name: Cuttlefish Development Environment

on:
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: 'Keep environment alive (minutes)'
        required: false
        default: '60'

jobs:
  cuttlefish-setup:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check KVM availability
        run: |
          echo "Checking KVM support..."
          if [ -e /dev/kvm ]; then
            echo "✓ /dev/kvm exists"
            ls -la /dev/kvm
          else
            echo "✗ /dev/kvm not found"
          fi
          
          echo "Checking CPU virtualization support..."
          if grep -q -E 'vmx|svm' /proc/cpuinfo; then
            echo "✓ CPU supports virtualization"
          else
            echo "✗ CPU does not support virtualization"
          fi

      - name: Optimize network settings
        run: |
          sudo sysctl -w net.core.default_qdisc=fq
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          sudo sysctl -w net.ipv4.tcp_window_scaling=1
          echo "Network optimizations applied"

      - name: Enable KVM group perms
        run: |
          if [ -e /dev/kvm ]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
            echo "KVM permissions configured via udev"
            ls -la /dev/kvm
          else
            echo "⚠️  /dev/kvm not found - KVM not available"
            echo "Attempting to load KVM module..."
            sudo modprobe kvm || echo "Failed to load KVM module"
            sudo modprobe kvm_intel || sudo modprobe kvm_amd || echo "Failed to load CPU-specific KVM module"
            ls -la /dev/kvm || echo "KVM still not available after module load"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-kvm \
            libvirt-daemon-system \
            libvirt-clients \
            bridge-utils \
            cpu-checker \
            wget \
            unzip \
            git

      - name: Verify KVM
        run: |
          kvm-ok || echo "KVM check failed, continuing anyway..."
          groups
          id

      - name: Download Cuttlefish
        run: |
          echo "Downloading Cuttlefish host package..."
          wget https://ci.android.com/builds/latest/branches/aosp-main/targets/aosp_cf_arm64_phone-trunk_staging-userdebug/view/cvd-host_package.tar.gz
          
          echo "Extracting Cuttlefish..."
          mkdir -p cuttlefish
          tar xzf cvd-host_package.tar.gz -C cuttlefish
          
          echo "Cuttlefish extracted to: $(pwd)/cuttlefish"
          ls -la cuttlefish/

      - name: Download Android image
        run: |
          echo "Downloading Android system image..."
          cd cuttlefish
          wget https://ci.android.com/builds/latest/branches/aosp-main/targets/aosp_cf_arm64_phone-trunk_staging-userdebug/view/cvd-host_package.tar.gz -O image.zip || \
          echo "Using alternative image source..."
          
      - name: Setup Cloudflare Tunnel
        env:
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_TUNNEL_TOKEN" ]; then
            echo "⚠️  CLOUDFLARE_TUNNEL_TOKEN not set in secrets"
            echo "Skipping Cloudflare Tunnel setup"
            echo "To enable: Add CLOUDFLARE_TUNNEL_TOKEN to repository secrets"
            exit 0
          fi
          
          echo "Installing cloudflared..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          sudo mv cloudflared-linux-arm64 /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          
          echo "Starting Cloudflare Tunnel..."
          cloudflared tunnel --no-autoupdate run --token $CLOUDFLARE_TUNNEL_TOKEN &
          
          sleep 5
          echo "✓ Cloudflare Tunnel started"

      - name: Start Cuttlefish
        run: |
          cd cuttlefish
          export PATH=$PATH:$(pwd)/bin
          export HOME=$(pwd)
          
          echo "Launching Cuttlefish..."
          ./bin/launch_cvd --daemon || echo "Launch failed, check logs"
          
          sleep 10
          
          echo "Checking Cuttlefish status..."
          ./bin/cvd_status || echo "Status check failed"

      - name: Display connection info
        run: |
          echo "================================"
          echo "Cuttlefish Development Environment"
          echo "================================"
          echo ""
          echo "ADB Connection:"
          echo "  adb connect localhost:6520"
          echo ""
          echo "WebRTC Interface:"
          echo "  https://localhost:8443"
          echo ""
          if [ ! -z "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" ]; then
            echo "Cloudflare Tunnel: Active"
            echo "Access via your configured tunnel domain"
          else
            echo "Cloudflare Tunnel: Not configured"
          fi
          echo ""
          echo "Environment will stay alive for ${{ github.event.inputs.keep_alive_minutes }} minutes"
          echo "================================"

      - name: Keep alive
        run: |
          echo "Keeping environment alive..."
          MINUTES=${{ github.event.inputs.keep_alive_minutes }}
          SECONDS=$((MINUTES * 60))
          
          echo "Will run for $MINUTES minutes ($SECONDS seconds)"
          
          for i in $(seq 1 $MINUTES); do
            echo "[$i/$MINUTES] Environment active... ($(date))"
            sleep 60
          done
          
          echo "Time limit reached, shutting down..."

      - name: Cleanup
        if: always()
        run: |
          echo "Stopping Cuttlefish..."
          cd cuttlefish
          ./bin/stop_cvd || true
          
          echo "Cleanup complete"
