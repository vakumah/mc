name: macOS VNC via bore

on:
  workflow_dispatch:  # Jalankan manual dari tab Actions

jobs:
  vnc:
    runs-on: macos-latest
    steps:
      - name: Checkout repository (opsional)
        uses: actions/checkout@v4

      - name: Install bore (tunnel client)
        run: |
          curl -L -o bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-apple-darwin.tar.gz
          tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/bore
          sudo chmod +x /usr/local/bin/bore
          rm bore.tar.gz

      - name: Aktifkan Screen Sharing (VNC)
        run: |
          # Mengaktifkan VNC dan mengizinkan semua user
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -users -allowAccessFor -allUsers -privs -all -restart -agent
          # Set password VNC (ganti 'github123' dengan password Anda)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvncpw -vncpw github123

      - name: Jalankan tunnel bore ke bore.pub
        run: |
          # Jalankan bore di background, simpan log
          bore local 5900 --to bore.pub > bore.log 2>&1 &
          sleep 3  # Tunggu sebentar agar bore sempat mencetak alamat
          echo "=== BORE LOG ==="
          cat bore.log
          echo "================"

          # Ekstrak alamat tunnel (contoh: bore.pub:12345)
          ADDR=$(grep -o 'bore.pub:[0-9]*' bore.log | head -1)
          if [ -n "$ADDR" ]; then
            echo "✅ VNC tunnel siap: $ADDR"
            echo "🔑 Password VNC: github123"
          else
            echo "⚠️  Tidak dapat mengekstrak alamat. Lihat log di atas."
          fi

      - name: Pertahankan job tetap hidup (maks 6 jam)
        run: |
          echo "🚀 Session berjalan. Hubungkan dengan VNC client ke alamat di atas."
          echo "⏳ Job akan berhenti otomatis setelah 6 jam, atau bisa di-cancel manual."
          sleep 6h
